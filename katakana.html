<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>カタカナひょう</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(180deg,#E3F2FD,#E8EAF6);
  font-family:'Zen Maru Gothic','Hiragino Kaku Gothic Pro',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;padding:6px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:clamp(2px,0.4vw,5px);
  max-width:1200px;width:100%;
}
.cell{
  border:3px solid #ccc;border-radius:clamp(4px,0.8vw,10px);
  background:#fff;display:flex;flex-direction:column;
  align-items:center;overflow:hidden;
  aspect-ratio:5/7;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
.h-area,.w-area{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  width:100%;cursor:pointer;transition:background .15s;
}
.h-area{flex:3;position:relative}
.h-area:active{background:#E3F2FD}
.w-area{flex:2;border-top:1px dashed #e0e0e0}
.w-area:active{background:#E8F5E9}
.h-char{font-size:clamp(20px,5.5vw,64px);font-weight:700;color:#333;line-height:1}
.k-char{position:absolute;bottom:1px;right:3px;font-size:clamp(7px,1.2vw,13px);color:#aaa;font-weight:500}
.emoji{font-size:clamp(14px,3vw,36px);line-height:1.1}
.word{font-size:clamp(6px,1.1vw,13px);color:#666;line-height:1.2;margin-top:1px;text-align:center}
.cell.hl{box-shadow:0 0 0 3px #1565C0;z-index:1}
/* Special cells */
.cell.sp{cursor:pointer;justify-content:center;border-style:dashed}
.cell.sp:active{transform:scale(.95)}
.sp-icon{font-size:clamp(18px,4vw,44px);line-height:1}
.sp-label{font-size:clamp(7px,1.2vw,14px);color:#555;margin-top:2px;text-align:center;font-weight:700}
.sp-title{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border-color:#42A5F5!important}
.sp-title .sp-icon{color:#1565C0;font-weight:700;font-size:clamp(13px,2.5vw,28px)}
.sp-switch{background:linear-gradient(135deg,#FFF9C4,#FFE0B2);border-color:#FFB74D!important}
.sp-switch .sp-label{color:#E65100}
.sp-random{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-color:#66BB6A!important}
.sp-readall{background:linear-gradient(135deg,#FCE4EC,#F8BBD0);border-color:#EC407A!important}
.sp-readall.active{animation:glow 1s infinite alternate}
@keyframes glow{from{box-shadow:0 0 4px #EC407A}to{box-shadow:0 0 14px #EC407A}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.cell.pop{animation:pop .25s ease}
@media(max-width:600px){.cell{border-width:2px}}
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
const C=['#BDBDBD','#64B5F6','#43A047','#AED581','#F06292','#FF8A65','#FFD54F','#FFB74D','#CE93D8','#81C784'];
const G=[
[['ワ','わ','ワッフル','🧇'],['ラ','ら','ラッパ','🎺'],['ヤ','や','ヤシ','🌴'],['マ','ま','マイク','🎤'],['ハ','は','ハンバーガー','🍔'],['ナ','な','ナッツ','🥜'],['タ','た','タクシー','🚕'],['サ','さ','サンタ','🎅'],['カ','か','カメラ','📷'],['ア','あ','アイス','🍨']],
['T',['リ','り','リボン','🎀'],'R',['ミ','み','ミルク','🥛'],['ヒ','ひ','ヒーロー','🦸'],['ニ','に','ニンジャ','🥷'],['チ','ち','チーズ','🧀'],['シ','し','シャワー','🚿'],['キ','き','キャンディー','🍬'],['イ','い','インコ','🦜']],
[['ヲ','を','',''],['ル','る','ルーペ','🔍'],['ユ','ゆ','ユニコーン','🦄'],['ム','む','ムース','🍮'],['フ','ふ','フライパン','🍳'],['ヌ','ぬ','ヌードル','🍜'],['ツ','つ','ツリー','🎄'],['ス','す','スプーン','🥄'],['ク','く','クレヨン','🖍️'],['ウ','う','ウインナー','🌭']],
['S',['レ','れ','レモン','🍋'],'A',['メ','め','メロン','🍈'],['ヘ','へ','ヘリコプター','🚁'],['ネ','ね','ネクタイ','👔'],['テ','て','テレビ','📺'],['セ','せ','セーター','🧥'],['ケ','け','ケーキ','🎂'],['エ','え','エプロン','👩‍🍳']],
[['ン','ん','',''],['ロ','ろ','ロボット','🤖'],['ヨ','よ','ヨット','⛵'],['モ','も','モノレール','🚝'],['ホ','ほ','ホットケーキ','🥞'],['ノ','の','ノート','📓'],['ト','と','トラック','🚚'],['ソ','そ','ソフトクリーム','🍦'],['コ','こ','コアラ','🐨'],['オ','お','オレンジ','🍊']]
];
const RO='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'.split('');
const CM={};
let raActive=false,raTimer=null;
const grid=document.getElementById('grid');

G.forEach(row=>{
  row.forEach((d,ci)=>{
    const el=document.createElement('div');
    if(typeof d==='string'){
      el.className='cell sp';
      if(d==='T'){
        el.classList.add('sp-title');
        el.innerHTML='<span class="sp-icon">カタカナ</span>';
        el.onclick=()=>{stopRA();speak('カタカナひょう')};
      }else if(d==='R'){
        el.classList.add('sp-switch');
        el.innerHTML='<span class="sp-icon">🕐</span><span class="sp-label">とけい</span>';
        el.onclick=()=>location.href='gomi';
      }else if(d==='S'){
        el.classList.add('sp-switch');
        el.innerHTML='<span class="sp-icon">ひらがな</span><span class="sp-label">→きりかえ</span>';
        el.onclick=()=>location.href='hiragana.html';
      }else if(d==='A'){
        el.id='ra-btn';
        el.classList.add('sp-readall');
        el.innerHTML='<span class="sp-icon">🔊</span><span class="sp-label">ぜんぶ</span>';
        el.onclick=doReadAll;
      }
    }else if(Array.isArray(d)){
      const[h,k,word,emoji]=d;
      el.className='cell';
      el.style.borderColor=C[ci];
      CM[h]=el;
      const ha=document.createElement('div');
      ha.className='h-area';
      ha.innerHTML='<span class="h-char">'+h+'</span><span class="k-char">'+k+'</span>';
      ha.onclick=()=>{stopRA();speak(h);flash(el)};
      el.appendChild(ha);
      if(word){
        const wa=document.createElement('div');
        wa.className='w-area';
        wa.innerHTML='<span class="emoji">'+emoji+'</span><span class="word">'+word+'</span>';
        wa.onclick=()=>{stopRA();speak(word);flash(el)};
        el.appendChild(wa);
      }else{ha.style.flex='1'}
    }
    grid.appendChild(el);
  });
});

let jpVoice=null;
function loadVoices(){
  const v=speechSynthesis.getVoices();
  jpVoice=v.find(x=>x.lang==='ja-JP')||v.find(x=>x.lang.startsWith('ja'));
}
speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

function speak(t){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='ja-JP';u.rate=0.85;u.pitch=1.1;
  if(jpVoice)u.voice=jpVoice;
  speechSynthesis.speak(u);
}
function flash(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop')}
function clearHL(){document.querySelectorAll('.hl').forEach(e=>e.classList.remove('hl'))}

function stopRA(){
  if(!raActive)return;raActive=false;clearTimeout(raTimer);clearHL();
  const b=document.getElementById('ra-btn');if(b)b.classList.remove('active');
}
function doRandom(){
  stopRA();speechSynthesis.cancel();clearHL();
  const ch=RO[Math.floor(Math.random()*RO.length)];
  speak(ch);if(CM[ch]){CM[ch].classList.add('hl');flash(CM[ch])}
}
function doReadAll(){
  if(raActive){stopRA();speechSynthesis.cancel();return}
  raActive=true;
  const b=document.getElementById('ra-btn');if(b)b.classList.add('active');
  let i=0;
  (function next(){
    if(!raActive||i>=RO.length){stopRA();return}
    clearHL();const ch=RO[i];speak(ch);
    if(CM[ch]){CM[ch].classList.add('hl');flash(CM[ch])}
    i++;raTimer=setTimeout(next,1000);
  })();
}
</script>
</body>
</html>
